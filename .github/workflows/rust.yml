name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - uses: Swatinem/rust-cache@v2

      - name: Dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libclang-dev libsdl3-dev
      
      - name: Build
        run: cargo build --verbose
    
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - uses: Swatinem/rust-cache@v2

      - name: Dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake libclang-dev libsdl3-dev
      
      - name: Test
        run: cargo test --verbose
